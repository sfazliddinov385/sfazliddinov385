<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030712"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7DD3FC"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1E293B" stroke-width="0.5" opacity="0.4"/>
    </pattern>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#grid)"/>

  <!-- top & bottom hairlines -->
  <line x1="56" y1="48" x2="1224" y2="48" stroke="#1E293B" stroke-width="1"/>
  <line x1="56" y1="272" x2="1224" y2="272" stroke="#1E293B" stroke-width="1"/>

  <!-- corner marks -->
  <path d="M 56 40 L 56 56 L 72 56" fill="none" stroke="#7DD3FC" stroke-width="1.5"/>
  <path d="M 1224 40 L 1224 56 L 1208 56" fill="none" stroke="#7DD3FC" stroke-width="1.5"/>
  <path d="M 56 280 L 56 264 L 72 264" fill="none" stroke="#7DD3FC" stroke-width="1.5"/>
  <path d="M 1224 280 L 1224 264 L 1208 264" fill="none" stroke="#7DD3FC" stroke-width="1.5"/>

  <!-- eyebrow -->
  <text x="56" y="86" font-family="JetBrains Mono, monospace" font-size="12" fill="#64748B" letter-spacing="4">
    BLUE TEAM · DETECTION ENGINEERING · 2026
  </text>

  <!-- massive wordmark -->
  <text x="56" y="198" font-family="Georgia, serif" font-style="italic" font-size="144" font-weight="400" fill="#F8FAFC" letter-spacing="-4">
    Beck<tspan fill="url(#accent)">.</tspan>
  </text>

  <!-- tagline -->
  <text x="62" y="244" font-family="JetBrains Mono, monospace" font-size="14" fill="#94A3B8" letter-spacing="2">
    SARVARBEK FAZLIDDINOV  —  SOC TIER 1 · CATCHES WHAT OTHERS MISS
  </text>
</svg>
